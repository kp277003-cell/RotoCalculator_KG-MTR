<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Roto Calc"/>
  <meta name="theme-color" content="#fffbeb"/>
  <title>Roto Film Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: #fffbeb;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #431a03;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px 14px 12px;
      gap: 8px;
      background: linear-gradient(160deg, #fffbeb 0%, #fef3c7 60%, #fffbeb 100%);
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: linear-gradient(135deg, #b45309, #d97706);
      border-radius: 14px;
      padding: 10px 14px;
      box-shadow: 0 4px 20px rgba(180,83,9,0.3);
    }
    .header-left h1 {
      font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px;
    }
    .header-left p { font-size: 9px; color: rgba(255,255,255,0.65); margin-top: 1px; }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    /* CARD */
    .card {
      background: #fff;
      border: 1px solid rgba(180,83,9,0.1);
      border-radius: 14px;
      padding: 10px 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(180,83,9,0.07);
    }

    .field-label {
      color: #6b7280;
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
      font-weight: 700;
    }

    /* MATERIAL SELECT */
    .select-wrapper { position: relative; }
    .select-box {
      background: #fffbeb;
      border: 1.5px solid #fcd34d;
      border-radius: 9px;
      padding: 8px 11px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sel-name { color: #b45309; font-weight: 700; font-size: 13px; }
    .sel-arrow { color: #d97706; font-size: 11px; transition: transform 0.2s; }
    .select-box.open .sel-arrow { transform: rotate(180deg); }

    .density-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: 20px;
      padding: 3px 10px;
      margin-top: 6px;
    }
    .d-label { color: #d97706; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
    .d-val { color: #b45309; font-weight: 800; font-size: 13px; }
    .d-unit { color: #9ca3af; font-size: 9px; }

    .dropdown-list {
      display: none;
      position: absolute;
      left: 0; right: 0;
      top: calc(100% + 3px);
      background: #fff;
      border: 1.5px solid #fcd34d;
      border-radius: 11px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 8px 30px rgba(180,83,9,0.15);
    }
    .dropdown-list.open { display: block; }
    .dropdown-list::-webkit-scrollbar { width: 3px; }
    .dropdown-list::-webkit-scrollbar-thumb { background: #fcd34d; border-radius: 3px; }
    .dropdown-item {
      padding: 9px 12px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
      border-bottom: 1px solid #f3f4f6;
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item.active { background: #fffbeb; }
    .item-name { color: #374151; font-size: 13px; font-weight: 500; }
    .item-den { color: #d97706; font-size: 11px; font-weight: 700; }

    /* WIDTH + MICRON */
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .input-field {
      width: 100%;
      background: #f9fafb;
      border: 1.5px solid #e5e7eb;
      border-radius: 9px;
      padding: 8px 10px;
      color: #431a03;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .input-field:focus { border-color: #f59e0b; background: #fffbeb; }
    .input-field::placeholder { color: #d1d5db; font-weight: 400; font-size: 11px; }

    /* KG & METER SIDE BY SIDE */
    .convert-row {
      display: grid;
      grid-template-columns: 1fr 22px 1fr;
      align-items: center;
      gap: 5px;
    }
    .convert-side { display: flex; flex-direction: column; gap: 4px; }
    .convert-label { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-align: center; }
    .kg-label { color: #2563eb; }
    .meter-label { color: #059669; }

    .big-input-wrap { position: relative; }
    .big-input {
      width: 100%;
      border-radius: 10px;
      padding: 9px 30px 9px 10px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      text-align: center;
      transition: all 0.2s;
    }
    .kg-input {
      background: #eff6ff;
      border: 1.5px solid #93c5fd;
      color: #1d4ed8;
    }
    .kg-input:focus { border-color: #2563eb; background: #dbeafe; }
    .meter-input {
      background: #ecfdf5;
      border: 1.5px solid #6ee7b7;
      color: #065f46;
    }
    .meter-input:focus { border-color: #059669; background: #d1fae5; }
    .big-input::placeholder { color: #d1d5db; font-weight: 400; font-size: 10px; }
    .input-unit {
      position: absolute; right: 7px; top: 50%;
      transform: translateY(-50%);
      font-weight: 800; font-size: 9px;
    }
    .kg-unit { color: #2563eb; }
    .meter-unit { color: #059669; }
    .arrow-divider { text-align: center; font-size: 15px; color: #f59e0b; }

    /* RESULT CARD */
    .result-card {
      flex: 1;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* EMPTY */
    .result-card.empty {
      background: #fff;
      border: 1.5px dashed #fcd34d;
      align-items: center;
      justify-content: center;
      color: #fcd34d;
      font-size: 12px;
      line-height: 2;
      text-align: center;
      box-shadow: 0 2px 12px rgba(180,83,9,0.06);
    }

    /* FILLED */
    .result-card.filled {
      background: #fff;
      border: 1.5px solid rgba(180,83,9,0.15);
      box-shadow: 0 4px 20px rgba(180,83,9,0.1);
      animation: popIn 0.25s ease;
      padding: 0;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    /* TOP RESULT ROW */
    .res-top {
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      flex-shrink: 0;
      padding: 10px 8px 8px;
    }
    .res-divider-v { background: #e5e7eb; }
    .res-item { text-align: center; padding: 0 6px; }
    .res-item-label {
      font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #9ca3af; font-weight: 700; margin-bottom: 3px;
    }
    .res-item-val { font-size: 26px; font-weight: 900; line-height: 1; }
    .res-item-unit { font-size: 10px; font-weight: 700; margin-left: 2px; }
    .kg-res-val { color: #2563eb; }
    .kg-res-unit { color: #93c5fd; }
    .meter-res-val { color: #059669; }
    .meter-res-unit { color: #6ee7b7; }

    /* DIVIDER */
    .res-divider-h { height: 1px; background: #f3f4f6; flex-shrink: 0; margin: 0 12px; }

    /* RATE INDICATOR BOX */
    .rate-box {
      flex: 1;
      padding: 8px 12px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
    }
    .rate-title {
      font-size: 9px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: #6b7280;
      display: flex; align-items: center; gap: 5px;
    }
    .rate-title-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, #b45309, #d97706);
    }

    /* GAUGE BAR */
    .gauge-wrap {
      background: #f3f4f6;
      border-radius: 99px;
      height: 10px;
      position: relative;
      overflow: hidden;
    }
    .gauge-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
      background: linear-gradient(90deg, #fbbf24, #b45309, #d97706);
      position: relative;
    }
    .gauge-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 6px;
      background: rgba(255,255,255,0.5);
      border-radius: 99px;
    }
    .gauge-labels {
      display: flex; justify-content: space-between;
      margin-top: 3px;
    }
    .gauge-label { font-size: 8px; color: #9ca3af; font-weight: 600; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }
    .stat-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      padding: 6px 8px;
      text-align: center;
    }
    .stat-label { font-size: 8px; color: #9ca3af; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
    .stat-val { font-size: 13px; font-weight: 800; color: #b45309; margin-top: 1px; }
    .stat-unit { font-size: 8px; color: #9ca3af; font-weight: 600; }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <h1>Roto Film Calculator</h1>
      <p>Flexible Packaging · Weight ↔ Length</p>
    </div>
    <div class="header-icon">🖨️</div>
  </div>

  <!-- MATERIAL -->
  <div class="card">
    <label class="field-label">📦 Material</label>
    <div class="select-wrapper">
      <div class="select-box" id="selectBox" onclick="toggleDropdown()">
        <span class="sel-name" id="selName">PET (Polyester Film)</span>
        <span class="sel-arrow" id="selArrow">▼</span>
      </div>
      <div class="dropdown-list" id="dropdownList"></div>
    </div>
    <div class="density-badge">
      <span class="d-label">DENSITY</span>
      <span class="d-val" id="densityVal">1.40</span>
      <span class="d-unit">g/cm³</span>
    </div>
  </div>

  <!-- WIDTH + MICRON -->
  <div class="card">
    <div class="input-grid">
      <div>
        <label class="field-label">📏 Width (mm)</label>
        <input class="input-field" type="number" inputmode="decimal" id="widthInput" placeholder="e.g. 1000" oninput="recalculate()"/>
      </div>
      <div>
        <label class="field-label">🔬 Micron (μ)</label>
        <input class="input-field" type="number" inputmode="decimal" id="micronInput" placeholder="e.g. 30" oninput="recalculate()"/>
      </div>
    </div>
  </div>

  <!-- KG ↔ METER -->
  <div class="card">
    <div class="convert-row">
      <div class="convert-side">
        <div class="convert-label kg-label">⚖️ KG નાખો</div>
        <div class="big-input-wrap">
          <input class="big-input kg-input" type="number" inputmode="decimal" id="kgInput" placeholder="કિલોગ્રામ..." oninput="calcFromKg()"/>
          <span class="input-unit kg-unit">KG</span>
        </div>
      </div>
      <div class="arrow-divider">⇄</div>
      <div class="convert-side">
        <div class="convert-label meter-label">📏 Meter નાખો</div>
        <div class="big-input-wrap">
          <input class="big-input meter-input" type="number" inputmode="decimal" id="meterInput" placeholder="મીટર..." oninput="calcFromMeter()"/>
          <span class="input-unit meter-unit">MTR</span>
        </div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="result-card empty" id="resultCard">
    <div>🖨️</div>
    <div>KG અથવા Meter નાખો</div>
    <div>Result અહીં દેખાશે</div>
  </div>

</div>

<script>
  const MATERIALS = [
    { name: "PET (Polyester Film)", density: 1.40 },
    { name: "BOPP (Biaxially Oriented PP)", density: 0.91 },
    { name: "Aluminum Foil", density: 2.70 },
    { name: "CPP (Cast Polypropylene)", density: 0.91 },
    { name: "LD (Low Density PE Film)", density: 0.93 },
    { name: "Milky LD", density: 0.95 },
  ];

  let selectedIndex = 0;

  const list = document.getElementById('dropdownList');
  MATERIALS.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'dropdown-item' + (i === 0 ? ' active' : '');
    div.innerHTML = `<span class="item-name">${m.name}</span><span class="item-den">${m.density} g/cm³</span>`;
    div.onclick = () => selectMaterial(i);
    list.appendChild(div);
  });

  function toggleDropdown() {
    const box = document.getElementById('selectBox');
    const dl = document.getElementById('dropdownList');
    box.classList.toggle('open');
    dl.classList.toggle('open');
    document.getElementById('selArrow').textContent = dl.classList.contains('open') ? '▲' : '▼';
  }

  function selectMaterial(i) {
    selectedIndex = i;
    document.getElementById('selName').textContent = MATERIALS[i].name;
    document.getElementById('densityVal').textContent = MATERIALS[i].density;
    document.querySelectorAll('.dropdown-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
    document.getElementById('dropdownList').classList.remove('open');
    document.getElementById('selectBox').classList.remove('open');
    document.getElementById('selArrow').textContent = '▼';
    recalculate();
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.select-wrapper')) {
      document.getElementById('dropdownList').classList.remove('open');
      document.getElementById('selectBox').classList.remove('open');
      document.getElementById('selArrow').textContent = '▼';
    }
  });

  function getKgPerMeter() {
    const w = parseFloat(document.getElementById('widthInput').value);
    const t = parseFloat(document.getElementById('micronInput').value);
    if (!w || !t) return null;
    return (w / 1000) * (t / 1000000) * MATERIALS[selectedIndex].density * 1000;
  }

  function showResult(kg, meter, kgPerMeter) {
    // Gauge: based on kg/meter ratio — visual indicator
    // Max reference: Aluminum at 1000mm 50 micron ≈ 0.135 kg/m → use 0.2 as max
    const maxRef = 0.20;
    const pct = Math.min((kgPerMeter / maxRef) * 100, 100).toFixed(0);

    // Rate color
    let rateColor, rateLabel;
    if (kgPerMeter < 0.05) { rateColor = '#10b981'; rateLabel = 'Light'; }
    else if (kgPerMeter < 0.10) { rateColor = '#f59e0b'; rateLabel = 'Medium'; }
    else { rateColor = '#ef4444'; rateLabel = 'Heavy'; }

    const rc = document.getElementById('resultCard');
    rc.className = 'result-card filled';
    rc.innerHTML = `
      <!-- TOP: KG & METER -->
      <div class="res-top">
        <div class="res-item">
          <div class="res-item-label">⚖️ Weight</div>
          <div>
            <span class="res-item-val kg-res-val">${kg}</span>
            <span class="res-item-unit kg-res-unit">KG</span>
          </div>
        </div>
        <div class="res-divider-v"></div>
        <div class="res-item">
          <div class="res-item-label">📏 Length</div>
          <div>
            <span class="res-item-val meter-res-val">${meter}</span>
            <span class="res-item-unit meter-res-unit">MTR</span>
          </div>
        </div>
      </div>

      <div class="res-divider-h"></div>

      <!-- RATE INDICATOR -->
      <div class="rate-box">
        <div class="rate-title">
          <div class="rate-title-dot"></div>
          Film Weight Rate Indicator
          <span style="margin-left:auto;background:${rateColor}20;color:${rateColor};font-size:9px;font-weight:700;padding:2px 8px;border-radius:99px;border:1px solid ${rateColor}40">${rateLabel}</span>
        </div>

        <div class="gauge-wrap">
          <div class="gauge-fill" id="gaugeFill" style="width:${pct}%;background:linear-gradient(90deg,#fbbf24,${rateColor})"></div>
        </div>
        <div class="gauge-labels">
          <span class="gauge-label">Light</span>
          <span class="gauge-label" style="color:#b45309;font-weight:800">${kgPerMeter.toFixed(4)} kg/m</span>
          <span class="gauge-label">Heavy</span>
        </div>

        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-label">KG / Mtr</div>
            <div class="stat-val">${kgPerMeter.toFixed(4)}</div>
            <div class="stat-unit">kg/m</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Mtr / KG</div>
            <div class="stat-val">${(1/kgPerMeter).toFixed(2)}</div>
            <div class="stat-unit">m/kg</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">GSM</div>
            <div class="stat-val">${(kgPerMeter * 1000 / (parseFloat(document.getElementById('widthInput').value)/1000)).toFixed(1)}</div>
            <div class="stat-unit">g/m²</div>
          </div>
        </div>
      </div>
    `;
  }

  function showEmpty() {
    const rc = document.getElementById('resultCard');
    rc.className = 'result-card empty';
    rc.innerHTML = '<div>🖨️</div><div>KG અથવા Meter નાખો</div><div>Result અહીં દેખાશે</div>';
  }

  function calcFromKg() {
    document.getElementById('meterInput').value = '';
    const kgPerMeter = getKgPerMeter();
    const kg = parseFloat(document.getElementById('kgInput').value);
    if (!kgPerMeter || !kg) { showEmpty(); return; }
    const meter = (kg / kgPerMeter).toFixed(2);
    showResult(kg.toFixed(3), meter, kgPerMeter);
  }

  function calcFromMeter() {
    document.getElementById('kgInput').value = '';
    const kgPerMeter = getKgPerMeter();
    const meter = parseFloat(document.getElementById('meterInput').value);
    if (!kgPerMeter || !meter) { showEmpty(); return; }
    const kg = (meter * kgPerMeter).toFixed(3);
    showResult(kg, meter.toFixed(2), kgPerMeter);
  }

  function recalculate() {
    if (document.getElementById('kgInput').value) calcFromKg();
    else if (document.getElementById('meterInput').value) calcFromMeter();
    else showEmpty();
  }
</script>
</body>
</html>
