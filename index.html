<!DOCTYPE html>
<html lang="gu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Roto Calc"/>
  <meta name="theme-color" content="#0f0c29"/>
  <title>Roto Film Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: linear-gradient(150deg, #0f0c29 0%, #1a1040 50%, #0d1b2a 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #fff;
    }

    .app {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 10px 14px;
      gap: 8px;
    }

    /* HEADER */
    .header {
      text-align: center;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 800;
      color: #e2d9f3;
      letter-spacing: -0.3px;
    }
    .header p {
      font-size: 10px;
      color: rgba(255,255,255,0.35);
      margin-top: 1px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 14px;
      flex-shrink: 0;
    }

    .field-label {
      color: rgba(255,255,255,0.45);
      font-size: 9px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }

    /* MATERIAL SELECT */
    .select-wrapper { position: relative; margin-bottom: 6px; }

    .select-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sel-name { color: #e2d9f3; font-weight: 600; font-size: 13px; }
    .sel-arrow { color: #a78bfa; font-size: 12px; transition: transform 0.2s; }
    .select-box.open .sel-arrow { transform: rotate(180deg); }

    .density-row {
      display: flex; align-items: center; gap: 6px;
    }
    .density-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(167,139,250,0.15);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 20px;
      padding: 3px 10px;
    }
    .d-label { color: #a78bfa; font-size: 9px; font-weight: 700; letter-spacing: 1px; }
    .d-val { color: #e2d9f3; font-weight: 800; font-size: 14px; }
    .d-unit { color: rgba(255,255,255,0.38); font-size: 10px; }

    .dropdown-list {
      display: none;
      position: absolute;
      left: 0; right: 0;
      top: calc(100% + 3px);
      background: #1e1a3a;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      max-height: 180px;
      overflow-y: auto;
      z-index: 200;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }
    .dropdown-list.open { display: block; }
    .dropdown-list::-webkit-scrollbar { width: 3px; }
    .dropdown-list::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.4); border-radius: 3px; }

    .dropdown-item {
      padding: 9px 12px;
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .dropdown-item:last-child { border-bottom: none; }
    .dropdown-item.active { background: rgba(167,139,250,0.2); }
    .item-name { color: #ddd; font-size: 13px; }
    .item-den { color: #a78bfa; font-size: 11px; font-weight: 700; }

    /* WIDTH + MICRON */
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .input-field {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 9px 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .input-field:focus { border-color: rgba(167,139,250,0.5); }
    .input-field::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; font-size: 12px; }

    /* MODE TOGGLE */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 3px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .mode-btn {
      border: none; border-radius: 8px;
      padding: 8px 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
      transition: all 0.2s;
      background: transparent;
      color: rgba(255,255,255,0.35);
    }
    .mode-btn.active {
      background: linear-gradient(135deg, #7c3aed, #5b21b6);
      color: #fff;
      box-shadow: 0 3px 12px rgba(124,58,237,0.45);
    }

    /* MAIN INPUT */
    .main-input-wrap { position: relative; }
    .main-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(167,139,250,0.45);
      border-radius: 10px;
      padding: 10px 60px 10px 12px;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .main-input:focus { border-color: rgba(167,139,250,0.8); }
    .main-input::placeholder { color: rgba(255,255,255,0.18); font-weight: 400; font-size: 12px; }
    .main-unit {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      color: #a78bfa; font-weight: 800; font-size: 12px;
    }

    /* RESULT */
    .result-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(124,58,237,0.2), rgba(0,200,180,0.1));
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 16px;
      text-align: center;
      animation: popIn 0.25s ease;
      padding: 10px;
    }
    .empty-box {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 16px;
      color: rgba(255,255,255,0.2);
      font-size: 12px;
      line-height: 1.8;
      text-align: center;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    .result-label { color: rgba(255,255,255,0.45); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
    .result-number { color: #fff; font-size: 42px; font-weight: 900; text-shadow: 0 0 25px rgba(167,139,250,0.6); line-height: 1; }
    .result-unit { color: #a78bfa; font-size: 18px; font-weight: 700; margin-left: 4px; }
    .result-sub { color: rgba(255,255,255,0.3); font-size: 11px; margin-top: 5px; }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>🖨️ Roto Film Calculator</h1>
    <p>Weight ↔ Length · Flexible Packaging</p>
  </div>

  <!-- MATERIAL -->
  <div class="card">
    <label class="field-label">📦 Material</label>
    <div class="select-wrapper">
      <div class="select-box" id="selectBox" onclick="toggleDropdown()">
        <span class="sel-name" id="selName">PET (Polyester Film)</span>
        <span class="sel-arrow" id="selArrow">▼</span>
      </div>
      <div class="dropdown-list" id="dropdownList"></div>
    </div>
    <div class="density-row" style="margin-top:6px">
      <div class="density-badge">
        <span class="d-label">DENSITY</span>
        <span class="d-val" id="densityVal">1.40</span>
        <span class="d-unit">g/cm³</span>
      </div>
    </div>
  </div>

  <!-- WIDTH + MICRON -->
  <div class="card">
    <div class="input-grid">
      <div>
        <label class="field-label">📏 Width (mm)</label>
        <input class="input-field" type="number" inputmode="decimal" id="widthInput" placeholder="e.g. 1000" oninput="calculate()"/>
      </div>
      <div>
        <label class="field-label">🔬 Micron (μ)</label>
        <input class="input-field" type="number" inputmode="decimal" id="micronInput" placeholder="e.g. 30" oninput="calculate()"/>
      </div>
    </div>
  </div>

  <!-- MODE + INPUT -->
  <div class="card">
    <div class="mode-toggle" style="margin-bottom:8px">
      <button class="mode-btn active" id="btnKg" onclick="setMode('kg')">⚖️ KG → Meter</button>
      <button class="mode-btn" id="btnMeter" onclick="setMode('meter')">📏 Meter → KG</button>
    </div>
    <div class="main-input-wrap">
      <input class="main-input" type="number" inputmode="decimal" id="mainInput" placeholder="કિલોગ્રામ નાખો..." oninput="calculate()"/>
      <span class="main-unit" id="mainUnit">KG</span>
    </div>
  </div>

  <!-- RESULT -->
  <div id="resultArea" class="empty-box">
    <div>⬆️ બધી વિગત ભરો</div>
    <div>Result અહીં દેખાશે</div>
  </div>

</div>

<script>
  const MATERIALS = [
    { name: "PET (Polyester Film)", density: 1.40 },
    { name: "BOPP (Biaxially Oriented PP)", density: 0.91 },
    { name: "Aluminum Foil", density: 2.70 },
    { name: "CPP (Cast Polypropylene)", density: 0.91 },
    { name: "LD (Low Density PE Film)", density: 0.93 },
    { name: "Milky LD", density: 0.95 },
  ];

  let selectedIndex = 0;
  let currentMode = 'kg';

  const list = document.getElementById('dropdownList');
  MATERIALS.forEach((m, i) => {
    const div = document.createElement('div');
    div.className = 'dropdown-item' + (i === 0 ? ' active' : '');
    div.innerHTML = `<span class="item-name">${m.name}</span><span class="item-den">${m.density} g/cm³</span>`;
    div.onclick = () => selectMaterial(i);
    list.appendChild(div);
  });

  function toggleDropdown() {
    const box = document.getElementById('selectBox');
    const dl = document.getElementById('dropdownList');
    box.classList.toggle('open');
    dl.classList.toggle('open');
    document.getElementById('selArrow').textContent = dl.classList.contains('open') ? '▲' : '▼';
  }

  function selectMaterial(i) {
    selectedIndex = i;
    document.getElementById('selName').textContent = MATERIALS[i].name;
    document.getElementById('densityVal').textContent = MATERIALS[i].density;
    document.querySelectorAll('.dropdown-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
    document.getElementById('dropdownList').classList.remove('open');
    document.getElementById('selectBox').classList.remove('open');
    document.getElementById('selArrow').textContent = '▼';
    calculate();
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.select-wrapper')) {
      document.getElementById('dropdownList').classList.remove('open');
      document.getElementById('selectBox').classList.remove('open');
      document.getElementById('selArrow').textContent = '▼';
    }
  });

  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btnKg').classList.toggle('active', mode === 'kg');
    document.getElementById('btnMeter').classList.toggle('active', mode === 'meter');
    document.getElementById('mainInput').value = '';
    if (mode === 'kg') {
      document.getElementById('mainInput').placeholder = 'કિલોગ્રામ નાખો...';
      document.getElementById('mainUnit').textContent = 'KG';
    } else {
      document.getElementById('mainInput').placeholder = 'મીટર નાખો...';
      document.getElementById('mainUnit').textContent = 'MTR';
    }
    showEmpty();
  }

  function showEmpty() {
    const r = document.getElementById('resultArea');
    r.className = 'empty-box';
    r.innerHTML = '<div>⬆️ બધી વિગત ભરો</div><div>Result અહીં દેખાશે</div>';
  }

  function calculate() {
    const w = parseFloat(document.getElementById('widthInput').value);
    const t = parseFloat(document.getElementById('micronInput').value);
    const val = parseFloat(document.getElementById('mainInput').value);
    if (!w || !t || !val) { showEmpty(); return; }

    const kgPerMeter = (w / 1000) * (t / 1000000) * MATERIALS[selectedIndex].density * 1000;
    let resultVal, resultUnit, subText;

    if (currentMode === 'kg') {
      resultVal = (val / kgPerMeter).toFixed(2);
      resultUnit = 'Meter';
      subText = `${val} KG = ${resultVal} Meter`;
    } else {
      resultVal = (val * kgPerMeter).toFixed(3);
      resultUnit = 'KG';
      subText = `${val} Meter = ${resultVal} KG`;
    }

    const r = document.getElementById('resultArea');
    r.className = 'result-box';
    r.innerHTML = `
      <div class="result-label">✅ Result</div>
      <div>
        <span class="result-number">${resultVal}</span>
        <span class="result-unit">${resultUnit}</span>
      </div>
      <div class="result-sub">${subText}</div>
    `;
  }
</script>
</body>
</html>
